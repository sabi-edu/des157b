<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 4</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SUSE+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">`
</head>

<body>
    <header>
        <h1>Pampa</h1>
    </header>

    <section id="overlay">
        <img id="pampa-img" class="hidden" src="media/pampa.png" alt="Pampa cozy in bed">
        <p id="blurb" class="hidden">Pampita is my baby :3</p>
    </section>
    
    <video id="myVideo" muted loop autoplay playsinline>
        <source src="media/pampa.webm" type="video/webm">

        <source src="media/pampa.mp4" type="video/mp4">

        <p>Your browser doesn't support HTML5 video. Here is a <a href="media/pampa.mp4">link to the video</a> instead.</p>
    </video>

    <i class="fa-solid fa-expand"></i>

    <script>
        const overlay = document.querySelector('#overlay');
        const pampaImg = document.querySelector('#pampa-img');
        const blurb = document.querySelector('#blurb');
        const intervalID = setInterval(checkTime, 1000);

        // videoTime 

        (function(){
            'use strict';
            console.log('reading js');

            const fs = document.querySelector('.fa-expand')

            fs.addEventListener('click', function(){

                if(!document.fullscreenElement){
                    document.documentElement.requestFullscreen();
                } else {
                    document.exitFullscreen();
                }
            });

            function checkTime() {
                if(1 < myVideo.currentTime && myVideo.currentTime < 3) {
                    blurb.className = 'showing';
                } else {
                    blurb.className = 'hidden';
                }

                if(5 < myVideo.currentTime && myVideo.currentTime < 7) {
                    pampaImg.className = 'showing';
                } else {
                    pampaImg.className = 'hidden';
                }
            }
        })();

    </script>

</body>
</html>

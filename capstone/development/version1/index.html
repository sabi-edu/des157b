<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>She loves me not; she loves me.</title>

    <!-- Style -->
    <link rel="stylesheet" href="style.css">

    <!-- back4app -->
    <!-- <script type="text/javascript" src="https://unpkg.com/parse/dist/parse.min.js"></script>
    <script src="script.js" defer></script> -->

    <!-- Granim -->
    <script src="granim.min.js" defer ></script>

    <!-- JQuery -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.2/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script src="https://code.jquery.com/ui/1.14.2/jquery-ui.js"></script>

</head>

<body>

    <canvas id="granim-canvas" class="hidden"></canvas>

    <p id="prompt" >Send a message to a younger self.</p>
    
    <form data-parsley-validate target="_self">
        <input type="text" id="input" required>
        <input type="submit" id="submit">
    </form>

    <main class="hidden">
        <div id="draggable" class="response">
            <p id="response-area"></p>
            <img class="petal" src="media/petal.png" alt="Pink flower petal">
        </div>
    </main>

    <img id="flower" class="hidden" src="media/flower.png" alt="Pink flower">

    <footer>
        <!-- <p><a href="https://p5js.org/"><u>p5</u> | </a></p> -->
        <!-- <p><a href="https://d3js.org/"><u>D3</u> | </a></p> -->
        <!-- <p><a href="https://gsap.com/"><u>GSAP</u> | </a></p> -->
        <!-- <p><a href="https://www.back4app.com/"><u>back4app</u> | </a></p> -->
        <p><a href="https://sarcadass.github.io/granim.js/"><u>Granim</u> | </a></p>
        <p><a href="https://jquery.com/"><u>JQuery</u></a></p>
    </footer>

</body>
</html>
